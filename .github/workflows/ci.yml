name: Prospect gate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: ./prospect verify
      - run: python benchmark/mutation_pack.py
      - run: python tests/test_skill_parity.py
      - run: python tests/test_marson.py
      - run: python -m pytest tests/ -q
      - run: npm ci
        working-directory: web
      - run: npm run typecheck
        working-directory: web
      - run: npm run build
        working-directory: web
      - run: docker build -f Dockerfile.acceptance -t prospect-acceptance:ci .
